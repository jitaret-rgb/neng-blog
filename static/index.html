<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting to neng-lab.com...</title>
    <meta http-equiv="refresh" content="0; url=https://neng-lab.com/">
    <link rel="canonical" href="https://neng-lab.com/">
    <script>
        // Redirect to custom domain preserving path
        if (window.location.hostname === 'jitaret-rgb.github.io') {
            const newPath = window.location.pathname.replace('/neng-blog/', '/');
            window.location.href = 'https://neng-lab.com' + newPath + window.location.search + window.location.hash;
        }
    </script>
</head>
<body>
    <h1>Redirecting to neng-lab.com...</h1>
    <p>If you are not redirected, <a href="https://neng-lab.com/">click here</a>.</p>
</body>
</html>
