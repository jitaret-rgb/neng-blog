{{- /* Share Buttons Script */ -}}
{{ $shareScript := resources.Get "js/share-buttons.js" | minify | fingerprint }}
<script src="{{ $shareScript.RelPermalink }}" integrity="{{ $shareScript.Data.Integrity }}" crossorigin="anonymous"></script>

{{- /* Copy Code Button Script - Single Button Only */ -}}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const codeBlocks = document.querySelectorAll('.article-content div.highlight');
  
  codeBlocks.forEach(function(block) {
    // Check if button already exists
    const existingButton = block.querySelector('.copy-code-button');
    if (existingButton) {
      return; // Skip if button already exists
    }
    
    const button = document.createElement('button');
    button.className = 'copy-code-button';
    button.textContent = 'Copy';
    button.setAttribute('aria-label', 'Copy code');
    
    button.addEventListener('click', function() {
      const code = block.querySelector('code');
      if (code) {
        navigator.clipboard.writeText(code.textContent).then(function() {
          button.textContent = 'Copied!';
          button.style.background = 'var(--accent-color)';
          button.style.color = '#fff';
          setTimeout(function() {
            button.textContent = 'Copy';
            button.style.background = '';
            button.style.color = '';
          }, 2000);
        });
      }
    });
    
    block.appendChild(button);
  });
});
</script>
