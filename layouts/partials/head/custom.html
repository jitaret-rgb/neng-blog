{{- /* Custom Font - Noto Sans Thai */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --font-family: 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
  font-family: var(--font-family);
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-family);
}

.article-content div.highlight {
  position: relative;
}

.article-content div.highlight .copy-code-button {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 4px 8px;
  background: var(--card-background);
  border: 1px solid var(--card-separator-color);
  border-radius: 4px;
  color: var(--body-text-color);
  font-size: 12px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s, background 0.2s, color 0.2s;
  font-family: var(--font-family);
}

.article-content div.highlight .copy-code-button:hover {
  background: var(--card-background-hover);
}

.article-content div.highlight:hover .copy-code-button {
  opacity: 1;
}

.sidebar .widget--profile .avatar {
  border-radius: 50%;
  overflow: hidden;
}

.sidebar .widget--profile .avatar img {
  border-radius: 50%;
  object-fit: cover;
  width: 100%;
  height: 100%;
}
</style>
