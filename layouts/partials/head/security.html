<!-- Security Headers via <meta> tags (GitHub Pages compatible) -->
<!-- NOTE: X-Frame-Options, X-Content-Type-Options, X-XSS-Protection -->
<!--       must be set as HTTP response headers (e.g. via Cloudflare dashboard) -->
<!--       because browsers do not honor them in <meta> tags.               -->

<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

<!-- Content Security Policy -->
<!-- Cloudflare Insights (Web Analytics) script-src added to prevent console errors -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://giscus.app https://cdn.jsdelivr.net https://static.cloudflareinsights.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://giscus.app;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' https://images.unsplash.com https://cdn.jsdelivr.net https://github.com https://github.githubassets.com data: blob:;
               frame-src https://giscus.app;
               connect-src 'self' https://www.google-analytics.com https://stats.g.doubleclick.net https://giscus.app https://cloudflareinsights.com;">
