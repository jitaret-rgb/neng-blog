{{- /* Article Schema for SEO */ -}}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify | safeJS }},
  "description": {{ .Description | default .Site.Params.description | jsonify | safeJS }},
  "image": {{ if .Params.image }}{{ .Params.image | absURL | jsonify | safeJS }}{{ else }}{{ .Site.Params.defaultCover | absURL | jsonify | safeJS }}{{ end }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
  "author": {
    "@type": "Person",
    "name": "เหน่ง",
    "url": {{ "/about/" | absURL | jsonify | safeJS }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "Code & Community",
    "logo": {
      "@type": "ImageObject",
      "url": {{ "images/profile.jpg" | absURL | jsonify | safeJS }}
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify | safeJS }}
  },
  "wordCount": {{ .WordCount }},
  "inLanguage": "th",
  {{- if .Params.tags }}
  "keywords": {{ delimit .Params.tags ", " | jsonify | safeJS }},
  {{- end }}
  "articleSection": {{ if .Params.categories }}{{ index .Params.categories 0 | jsonify | safeJS }}{{ else }}"Blog"{{ end }}
}
</script>
{{- end }}
