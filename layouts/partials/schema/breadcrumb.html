{{- /* BreadcrumbList Schema for SEO */ -}}
{{- if or .IsHome .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {{- if .IsPage }}
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ .Site.BaseURL | jsonify | safeJS }}
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Posts",
      "item": {{ "/posts/" | absURL | jsonify | safeJS }}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify | safeJS }},
      "item": {{ .Permalink | jsonify | safeJS }}
    }
    {{- else }}
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ .Site.BaseURL | jsonify | safeJS }}
    }
    {{- end }}
  ]
}
</script>
{{- end }}
