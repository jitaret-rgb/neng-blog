{{- /* WebSite Schema for SEO */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Neng Lab",
  "alternateName": "Code & Community",
  "description": {{ .Site.Params.description | default "A blog about technology, community development, and life by Nueng" | jsonify | safeJS }},
  "url": {{ .Site.BaseURL | jsonify | safeJS }},
  "inLanguage": "th",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {{ "search/?q={search_term_string}" | absURL | jsonify | safeJS }},
    "query-input": "required name=search_term_string"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Neng Lab",
    "logo": {
      "@type": "ImageObject",
      "url": {{ "images/profile.jpg" | absURL | jsonify | safeJS }}
    }
  },
  "author": {
    "@type": "Person",
    "name": "เหน่ง",
    "url": {{ "/about/" | absURL | jsonify | safeJS }}
  }
}
</script>
{{- end }}
