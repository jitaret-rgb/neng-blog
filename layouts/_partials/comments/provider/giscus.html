{{- with .Site.Params.comments.giscus -}}
{{- $lightTheme := .lightTheme | default "noborder_light" -}}
{{- $darkTheme := .darkTheme | default "noborder_dark" -}}

<div class="giscus-container" role="region" aria-label="Comments section">
<script
    src="https://giscus.app/client.js"
    data-repo="{{- .repo -}}"
    data-repo-id="{{- .repoID -}}"
    data-category="{{- .category -}}"
    data-category-id="{{- .categoryID -}}"
    data-mapping="{{- .mapping -}}"
    data-strict="{{- .strict -}}"
    data-reactions-enabled="{{- .reactionsEnabled -}}"
    data-emit-metadata="{{- .emitMetadata -}}"
    data-input-position="{{- .inputPosition -}}"
    data-theme="{{- $lightTheme -}}"
    data-lang="{{- .lang -}}"
    data-loading="lazy"
    crossorigin="anonymous"
    async
></script>
</div>
<script>
    (function () {
        const lightTheme = '{{- $lightTheme -}}';
        const darkTheme = '{{- $darkTheme -}}';
        
        function getCurrentTheme() {
            const scheme = document.documentElement.dataset.scheme;
            if (scheme === "dark") return darkTheme;
            if (scheme === "light") return lightTheme;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                return darkTheme;
            }
            return lightTheme;
        }
        
        function setGiscusTheme(theme) {
            const giscus = document.querySelector("iframe.giscus-frame");
            if (giscus && giscus.contentWindow) {
                try {
                    giscus.contentWindow.postMessage(
                        { giscus: { setConfig: { theme: theme } } },
                        "https://giscus.app"
                    );
                } catch (err) {
                    console.debug("Giscus theme update failed:", err);
                }
            }
        }
        
        // ส่ง theme ที่ถูกต้องไปให้ giscus
        function updateGiscusTheme() {
            setGiscusTheme(getCurrentTheme());
        }
        
        // Message handler - เมื่อ giscus พร้อมใช้งาน
        const messageHandler = (e) => {
            if (e.origin !== "https://giscus.app") return;
            if (!(typeof e.data === 'object' && e.data.giscus)) return;
            
            const giscusData = e.data.giscus;
            // เมื่อ giscus ready หรือมี error
            if (giscusData.discussion || giscusData.error) {
                updateGiscusTheme();
            }
        };
        window.addEventListener("message", messageHandler);
        
        // ฟังก์ชันอัปเดต theme เมื่อ Stack Theme เปลี่ยน
        window.addEventListener("onColorSchemeChange", updateGiscusTheme);
        
        // ตรวจสอบการเปลี่ยนแปลง localStorage (กรณีเปิดหลาย tab)
        window.addEventListener("storage", function(e) {
            if (e.key === "StackColorScheme") {
                updateGiscusTheme();
            }
        });
        
        // MutationObserver: Detect เมื่อ iframe ถูกสร้างใหม่ (หลังกด Refresh ใน Giscus)
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeName === 'IFRAME' && node.classList.contains('giscus-frame')) {
                        // Iframe ถูกสร้าง/แทนที่ใหม่ รอให้โหลดเสร็จแล้วส่ง theme
                        node.addEventListener('load', function() {
                            // รออีกนิดให้ giscus พร้อม
                            setTimeout(updateGiscusTheme, 100);
                        });
                    }
                });
            });
        });
        
        // เริ่ม observe ตั้งแต่ DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                observer.observe(document.body, { childList: true, subtree: true });
                updateGiscusTheme();
            });
        } else {
            observer.observe(document.body, { childList: true, subtree: true });
            updateGiscusTheme();
        }
    })();
</script>
{{- end -}}
