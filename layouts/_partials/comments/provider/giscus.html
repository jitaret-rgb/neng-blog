{{- with .Site.Params.comments.giscus -}}
{{- $loading := .loading | default "eager" -}}
{{- $lightThemeUrl := "/css/giscus-teal-light.css" | absURL -}}
{{- $darkThemeUrl := "/css/giscus-teal-dark.css" | absURL -}}

<div class="giscus-container" role="region" aria-label="Comments section">
    <div class="giscus"></div>
</div>

<script>
    (function () {
        const lightTheme = '{{ $lightThemeUrl }}';
        const darkTheme = '{{ $darkThemeUrl }}';

        function getCurrentTheme() {
            const scheme = document.documentElement.dataset.scheme;
            return scheme === 'light' ? lightTheme : darkTheme;
        }

        function loadGiscus() {
            const existing = document.querySelector('script[data-repo="{{- .repo -}}"]');
            if (existing) return;

            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', '{{- .repo -}}');
            script.setAttribute('data-repo-id', '{{- .repoID -}}');
            script.setAttribute('data-category', '{{- .category -}}');
            script.setAttribute('data-category-id', '{{- .categoryID -}}');
            script.setAttribute('data-mapping', '{{- .mapping -}}');
            script.setAttribute('data-strict', '{{- .strict -}}');
            script.setAttribute('data-reactions-enabled', '{{- .reactionsEnabled -}}');
            script.setAttribute('data-emit-metadata', '{{- .emitMetadata -}}');
            script.setAttribute('data-input-position', '{{- .inputPosition -}}');
            script.setAttribute('data-theme', getCurrentTheme());
            script.setAttribute('data-lang', '{{- .lang -}}');
            script.setAttribute('data-loading', '{{- $loading -}}');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;

            const container = document.querySelector('.giscus-container');
            if (container) {
                container.appendChild(script);
            }
        }

        function applyGiscusTheme(theme) {
            const iframe = document.querySelector('iframe.giscus-frame');
            if (!iframe) return false;
            try {
                iframe.contentWindow.postMessage(
                    { giscus: { setConfig: { theme: theme } } },
                    'https://giscus.app'
                );
            } catch (e) {
                return false;
            }
            return true;
        }

        // Load giscus with the correct theme immediately
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadGiscus);
        } else {
            loadGiscus();
        }

        // Handle theme changes
        window.addEventListener('onColorSchemeChange', () => {
            applyGiscusTheme(getCurrentTheme());
        });

        // Re-apply theme when giscus sends messages (iframe ready, etc.)
        window.addEventListener('message', (e) => {
            if (e.origin !== 'https://giscus.app') return;
            if (!(typeof e.data === 'object' && e.data.giscus)) return;
            applyGiscusTheme(getCurrentTheme());
        });
    })();
</script>
{{- end -}}
