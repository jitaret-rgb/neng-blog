{{- with .Site.Params.comments.giscus -}}
{{- $baseURL := $.Site.BaseURL | default "https://jitaret-rgb.github.io/neng-blog/" -}}
{{- $lightThemeURL := printf "%scss/giscus-stack-light.css" $baseURL -}}
{{- $darkThemeURL := printf "%scss/giscus-stack-dark.css" $baseURL -}}
<div class="giscus-container" role="region" aria-label="Comments section">
<script
    src="https://giscus.app/client.js"
    data-repo="{{- .repo -}}"
    data-repo-id="{{- .repoID -}}"
    data-category="{{- .category -}}"
    data-category-id="{{- .categoryID -}}"
    data-mapping="{{- .mapping -}}"
    data-strict="{{- .strict -}}"
    data-reactions-enabled="{{- .reactionsEnabled -}}"
    data-emit-metadata="{{- .emitMetadata -}}"
    data-input-position="{{- .inputPosition -}}"
    data-theme="{{- $lightThemeURL -}}"
    data-lang="{{- .lang -}}"
    data-loading="lazy"
    crossorigin="anonymous"
    async
></script>
</div>
<script>
    (function () {
        const lightThemeURL = '{{- $lightThemeURL -}}';
        const darkThemeURL = '{{- $darkThemeURL -}}';
        
        function setGiscusTheme(theme) {
            const giscus = document.querySelector("iframe.giscus-frame");
            if (giscus && giscus.contentWindow) {
                try {
                    giscus.contentWindow.postMessage(
                        {
                            giscus: {
                                setConfig: {
                                    theme: theme,
                                },
                            },
                        },
                        "https://giscus.app"
                    );
                } catch (err) {
                    console.debug("Giscus theme update failed:", err);
                }
            }
        }

        const messageHandler = (e) => {
            if (e.origin !== "https://giscus.app") return;
            handler();
        };
        
        addEventListener("message", messageHandler);
        window.addEventListener("onColorSchemeChange", handler);

        function handler() {
            if (document.documentElement.dataset.scheme === "light") {
                setGiscusTheme(lightThemeURL);
            } else {
                setGiscusTheme(darkThemeURL);
            }
        }
    })();
</script>
{{- end -}}
