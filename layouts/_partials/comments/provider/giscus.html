{{- with .Site.Params.comments.giscus -}}
{{- $lightTheme := .lightTheme | default "noborder_light" -}}
{{- $darkTheme := .darkTheme | default "noborder_dark" -}}

<div class="giscus-container" role="region" aria-label="Comments section">
<script
    src="https://giscus.app/client.js"
    data-repo="{{- .repo -}}"
    data-repo-id="{{- .repoID -}}"
    data-category="{{- .category -}}"
    data-category-id="{{- .categoryID -}}"
    data-mapping="{{- .mapping -}}"
    data-strict="{{- .strict -}}"
    data-reactions-enabled="{{- .reactionsEnabled -}}"
    data-emit-metadata="{{- .emitMetadata -}}"
    data-input-position="{{- .inputPosition -}}"
    data-theme="{{- $lightTheme -}}"
    data-lang="{{- .lang -}}"
    data-loading="lazy"
    crossorigin="anonymous"
    async
></script>
</div>
<script>
    (function () {
        const lightTheme = '{{- $lightTheme -}}';
        const darkTheme = '{{- $darkTheme -}}';
        
        function getCurrentTheme() {
            // ตรวจสอบจาก data-scheme ที่ตั้งค่าไว้ใน HTML (โดย Stack Theme)
            const scheme = document.documentElement.dataset.scheme;
            if (scheme === "dark") return darkTheme;
            if (scheme === "light") return lightTheme;
            // Auto mode: เช็ค system preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                return darkTheme;
            }
            return lightTheme;
        }
        
        function setGiscusTheme(theme) {
            const giscus = document.querySelector("iframe.giscus-frame");
            if (giscus && giscus.contentWindow) {
                try {
                    giscus.contentWindow.postMessage(
                        {
                            giscus: {
                                setConfig: {
                                    theme: theme,
                                },
                            },
                        },
                        "https://giscus.app"
                    );
                } catch (err) {
                    console.debug("Giscus theme update failed:", err);
                }
            }
        }
        
        // อัปเดต theme ตอน giscus พร้อมใช้งาน
        const messageHandler = (e) => {
            if (e.origin !== "https://giscus.app") return;
            if (!(typeof e.data === 'object' && e.data.giscus)) return;
            
            const giscusData = e.data.giscus;
            // เมื่อ giscus พร้อม (มี discussion หรือ error กลับมา)
            if (giscusData.discussion || giscusData.error) {
                setGiscusTheme(getCurrentTheme());
            }
        };
        
        window.addEventListener("message", messageHandler);
        
        // ฟังก์ชันอัปเดต theme เมื่อ Stack Theme เปลี่ยน
        function updateTheme() {
            setGiscusTheme(getCurrentTheme());
        }
        
        // รอฟัง event onColorSchemeChange จาก Stack theme
        window.addEventListener("onColorSchemeChange", updateTheme);

        // ตรวจสอบการเปลี่ยนแปลง localStorage (กรณีเปิดหลาย tab)
        window.addEventListener("storage", function(e) {
            if (e.key === "StackColorScheme") {
                updateTheme();
            }
        });
        
        // ตรวจสอบ theme เมื่อโหลดหน้าเสร็จ (DOM ready)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateTheme);
        } else {
            // DOM โหลดแล้ว รอ iframe สักครู่
            setTimeout(updateTheme, 100);
        }
    })();
</script>
{{- end -}}
