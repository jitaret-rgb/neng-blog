{{- with .Site.Params.comments.giscus -}}
{{- $loading := .loading | default "eager" -}}
{{- $lightThemeUrl := "/css/giscus-teal-light.css" | absURL -}}
{{- $darkThemeUrl := "/css/giscus-teal-dark.css" | absURL -}}

<div class="giscus-container" role="region" aria-label="Comments section">
<script
    src="https://giscus.app/client.js"
    data-repo="{{- .repo -}}"
    data-repo-id="{{- .repoID -}}"
    data-category="{{- .category -}}"
    data-category-id="{{- .categoryID -}}"
    data-mapping="{{- .mapping -}}"
    data-strict="{{- .strict -}}"
    data-reactions-enabled="{{- .reactionsEnabled -}}"
    data-emit-metadata="{{- .emitMetadata -}}"
    data-input-position="{{- .inputPosition -}}"
    data-theme="{{ $lightThemeUrl }}"
    data-lang="{{- .lang -}}"
    data-loading="{{- $loading -}}"
    crossorigin="anonymous"
    async>
</script>
<script>
    (function () {
        let pendingTheme = document.documentElement.dataset.scheme === 'light'
            ? '{{ $lightThemeUrl }}'
            : '{{ $darkThemeUrl }}';

        function applyGiscusTheme(theme) {
            const iframe = document.querySelector('iframe.giscus-frame');
            if (!iframe) return false;
            iframe.contentWindow.postMessage(
                { giscus: { setConfig: { theme: theme } } },
                'https://giscus.app'
            );
            return true;
        }

        function setGiscusTheme(theme) {
            pendingTheme = theme;
            applyGiscusTheme(theme);
        }

        // Watch for iframe creation and apply pending theme
        const giscusContainer = document.querySelector('.giscus');
        if (giscusContainer) {
            const observer = new MutationObserver((mutations) => {
                for (const mutation of mutations) {
                    for (const node of mutation.addedNodes) {
                        if (node.nodeName === 'IFRAME' && node.classList.contains('giscus-frame')) {
                            applyGiscusTheme(pendingTheme);
                        }
                    }
                }
            });
            observer.observe(giscusContainer, { childList: true, subtree: true });
        }

        // Apply theme when color scheme changes
        window.addEventListener('onColorSchemeChange', () => {
            const scheme = document.documentElement.dataset.scheme;
            const theme = scheme === 'light' ? '{{ $lightThemeUrl }}' : '{{ $darkThemeUrl }}';
            setGiscusTheme(theme);
        });

        // Re-apply theme on giscus messages to stay in sync
        window.addEventListener('message', (e) => {
            if (e.origin !== 'https://giscus.app') return;
            applyGiscusTheme(pendingTheme);
        });
    })();
</script>
</div>
{{- end -}}
