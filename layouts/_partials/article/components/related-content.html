{{- $related := .Site.RegularPages.Related . | first 5 -}}
{{- with $related -}}
<section class="related-content">
    <h2>📖 อ่านบทความที่เกี่ยวข้อง</h2>
    <ul>
        {{- range . -}}
            <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
        {{- end -}}
    </ul>
</section>
{{- end -}}
