baseURL = 'https://jitaret-rgb.github.io/neng-blog/'
languageCode = 'th-th'
title = 'Code & Community'
theme = 'hugo-theme-stack'

# Exclude local development files from build
ignoreFiles = ['\.kimi/.*']

[params]
  subtitle = "Bridging Technology and Community Development"
  description = "A blog about technology, community development, and life by Nueng"
  keywords = ["blog", "neng", "thai", "technology", "lifestyle"]
  defaultTheme = "dark"
  mainSections = ["posts"]
  
  # RSS Full Content (แสดงเนื้อหาเต็มใน RSS feed)
  rssFullContent = true
  
  # Favicon (ต้องวางไฟล์ที่ static/favicon.ico)
  # favicon = "/favicon.ico"
  
  # Custom Font - Noto Sans Thai
  [[params.headCustomHTML]]
    html = """<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">"""
  
  [params.sidebar]
    subtitle = "Bridging Technology and Community Development"
    avatar = "img/profile.jpg"
    emoji = "💻"              # Emoji ที่แสดงเหนือ avatar
    # compact = false         # ใช้ sidebar แบบ compact (optional)
    
  [params.article]
    math = false
    toc = true
    readingTime = true
    headingAnchor = true      # แสดง anchor links ข้าง headings เมื่อ hover
    
    [params.article.mermaid]  # Mermaid diagram configuration
      look = "classic"        # "classic" หรือ "handDrawn"
      lightTheme = "default"    # ธีมสำหรับ light mode
      darkTheme = "dark"        # ธีมสำหรับ dark mode (สลับธีมอัตโนมัติ)
      securityLevel = "strict"  # "strict" หรือ "loose" (สำหรับ HTML labels)
    
    [params.article.license]
      enabled = true
      default = "<a rel=\"license\" href=\"http://creativecommons.org/licenses/by-nc/4.0/\">CC BY-NC 4.0</a>"
  
  # Color Scheme (Dark/Light Mode)
  [params.colorScheme]
    toggle = true        # แสดงปุ่มสลับ theme
    default = "dark"     # ค่าเริ่มต้น: light | dark | auto

# Cookie Consent (GDPR) - ปิดชั่วคราวเพื่อทดสอบ Giscus
[cookies]
  enabled = false

[params.comments]
  enabled = true
  provider = "giscus"

[params.comments.giscus]
    repo = "jitaret-rgb/neng-blog"
    repoID = "R_kgDOR6Wt7Q"
    category = "Announcements"
    categoryID = "DIC_kwDOR6Wt7c4C6TwS"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    lightTheme = "noborder_dark"
    darkTheme = "noborder_dark"
    theme = "noborder_dark"
    lang = "en"
    loading = "eager"
    
  [params.cards]
    limit = 10
    
  [params.footer]
    since = 2026              # ปีเริ่มต้น blog (ปีปัจจุบัน)
    customText = ""
    
  [params.dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"
    
  [params.smartimage]
    enabled = true

  # Image Processing (Hugo Stack Theme)
  [params.imageProcessing]
    autoOrient = true        # หมุนรูปตาม EXIF data อัตโนมัติ
    
    [params.imageProcessing.thumbnail]
      enabled = true         # เปิดใช้งาน thumbnail สำหรับ tile/compact layouts
      
    [params.imageProcessing.content]
      enabled = true         # เปิดใช้งาน responsive images ในเนื้อหา
      widths = [400, 800, 1200, 1600]  # ขนาดที่จะสร้างสำหรับ srcset

[params.author]
  name = "เหน่ง"
  email = "jitaret@gmail.com"

# Open Graph (ogp.me standard)
[params.opengraph]
  enabled = true
  image = "images/default-cover.jpg"
  locale = "th_TH"
  [params.opengraph.twitter]
    site = "Majinman"
    card = "summary_large_image"  # "summary" หรือ "summary_large_image"

# Google Analytics
[services]
  [services.googleAnalytics]
    ID = "G-Q59XSCDQZR"

# Widgets
[[params.widgets.homepage]]
  type = "search"

[[params.widgets.homepage]]
  type = "categories"
  params = { limit = 10 }

[[params.widgets.homepage]]
  type = "tag-cloud"
  params = { limit = 10 }

[[params.widgets.page]]
  type = "toc"

# Menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
  [menu.main.params]
    icon = "home"

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2
  [menu.main.params]
    icon = "article"

[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 3
  [menu.main.params]
    icon = "category-2"

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4
  [menu.main.params]
    icon = "tag"

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 5
  [menu.main.params]
    icon = "user"

# Social Menu (แสดงเหนือ Dark Mode)
[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/jitaret-rgb"
  weight = 1
  [menu.social.params]
    icon = "brand-github"

[[menu.social]]
  identifier = "telegram"
  name = "Telegram"
  url = "https://t.me/Majinman"
  weight = 2
  [menu.social.params]
    icon = "brand-telegram"

[[menu.social]]
  identifier = "facebook"
  name = "Facebook"
  url = "https://www.facebook.com/jittaret.phromnanra/"
  weight = 3
  [menu.social.params]
    icon = "brand-facebook"
    newTab = true

[[menu.social]]
  identifier = "youtube"
  name = "YouTube"
  url = "https://www.youtube.com/@jittaretpromnara5716"
  weight = 4
  [menu.social.params]
    icon = "brand-youtube"
    newTab = true



# Image Processing Configuration
[imaging]
  quality = 85
  resampleFilter = "lanczos"
  hint = "photo"
  anchor = "smart"
  bgColor = "#ffffff"
  
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    excludeFields = ""
    includeFields = ""

[permalinks]
  page = "/:slug/"

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
    
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
