baseURL = 'https://jitaret-rgb.github.io/neng-blog/'
languageCode = 'th-th'
title = 'Code & Community'
theme = 'hugo-theme-stack'

[params]
  subtitle = "Bridging Technology and Community Development"
  description = "A blog about technology, community development, and life by Nueng"
  keywords = ["blog", "neng", "thai", "technology", "lifestyle"]
  defaultTheme = "auto"
  mainSections = ["posts"]
  
  # Custom Font - Noto Sans Thai
  [[params.headCustomHTML]]
    html = """<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">"""
  
  [params.sidebar]
    subtitle = "Bridging Technology and Community Development"
    avatar = "img/profile.jpg"
    
  [params.article]
    math = false
    toc = true
    readingTime = true
    [params.article.license]
      enabled = true
      default = "<a rel=\"license\" href=\"http://creativecommons.org/licenses/by-nc/4.0/\">CC BY-NC 4.0</a>"
    
  [params.comments]
    enabled = false
    
  [params.cards]
    limit = 10
    
  [params.footer]
    since = 2026
    customText = ""
    
  [params.dateFormat]
    single = "2 January 2006"
    list = "2 January 2006"
    
  [params.smartimage]
    enabled = true

[params.author]
  name = "เหน่ง"
  email = "jitaret@gmail.com"

# Widgets
[[params.widgets.homepage]]
  type = "search"

[[params.widgets.homepage]]
  type = "categories"
  [params.widgets.homepage.params]
    limit = 10

[[params.widgets.homepage]]
  type = "tag-cloud"
  [params.widgets.homepage.params]
    limit = 10

[[params.widgets.page]]
  type = "toc"

